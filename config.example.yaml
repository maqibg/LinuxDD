# ==============================================================================
# LinuxDD TG 监控配置示例
# 复制为 config.yaml 后填写真实 Telegram 与站点参数
# ==============================================================================

sites:
  linuxdo:
    enabled: true
    name: "Linux.do"
    base_url: "https://linux.do"
    login_url: "https://linux.do/login"
    check_interval: 60

    # Linux.do 现在通过浏览器手动登录，不再依赖 user_api_key
    auth:
      mode: "manual_browser"

    remote_browser:
      enabled: true

    browser:
      user_data_dir: "./chrome_profile"
      headless: false
      debug_port: 9222
      # Docker/root 运行通常需要 no_sandbox=true；非 root 运行可设为 false
      no_sandbox: true
      disable_dev_shm_usage: true
      disable_infobars: true
      disable_automation_controlled: true

    # 站点专用代理；enabled=false 时不覆盖 global.site_proxy
    proxy:
      enabled: false
      host: "127.0.0.1"
      port: 7890
      type: "http"

    telegram:
      # 人工处理通知：启动未登录、取帖失败/Cloudflare 盾时发送 noVNC 地址
      manual_review:
        enabled: true
        # 固定通知用户推荐直接写 chat_id；chat_id_from 支持 first_keyword_subscriber/channel_id，也兼容数字 chat_id
        chat_id_from: "first_keyword_subscriber"
        on_login_required: true
        on_fetch_error: true
      bot_token: "123456789:ABCdefGHIjklMNOpqrsTUVwxyz"
      channel_id: "-1001234567890"
      keyword_subscribers:
        - chat_id: "123456789"
          name: "福利订阅"
          keywords: "公益|福利|教程|linux|论坛|开源|监控|tg"
          exclude_keywords: "求助|翻车|合租"
        - chat_id: ""
          name: "配置模板"
          keywords: "关键词1|关键词2|关键词3"
          exclude_keywords: "屏蔽词1|屏蔽词2"

    filter:
      categories: []
      sort_by_time: true

  idcflare:
    enabled: false
    name: "IDCFlare"
    base_url: "https://idcflare.com"
    check_interval: 120
    user_api_key: "your_idcflare_api_key"

    telegram:
      bot_token: "123456789:ABCdefGHIjklMNOpqrsTUVwxyz"
      channel_id: ""
      keyword_subscribers:
        - chat_id: "123456789"
          name: "IDC福利"
          keywords: "优惠|促销|免费"
          exclude_keywords: ""

    filter:
      categories: []
      sort_by_time: true

global:
  # Docker / noVNC 远程浏览器配置；所有 noVNC/VNC 项都在这里配置，不需要 export 环境变量
  novnc:
    enabled: true
    password: "change-this-password"
    listen_host: "0.0.0.0"
    port: 6080
    vnc_port: 5900
    public_host: "服务器IP"
    public_url: ""
    scheme: "http"
    display_number: 99
    login_wait_timeout: 1200

  proxy:
    enabled: false
    host: "127.0.0.1"
    port: 7890
    type: "http"

  # 站点请求的全局代理，站点专用代理未启用时会自动继承
  site_proxy:
    enabled: false
    host: "127.0.0.1"
    port: 7890
    type: "http"

  database:
    path: "data/topics.db"

  logging:
    level: "INFO"
    file: "logs/monitor.log"
    max_bytes: 10485760
    backup_count: 3
